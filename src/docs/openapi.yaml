components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string

  schemas:
    ChatResponse:
      type: object
      properties:
        response:
          type: string
        sessionId:
          type: string
        iterations:
          type: integer
        toolsUsed:
          type: array
          items:
            type: string
        healed:
          type: boolean

    Agent:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        model:
          type: string
        channels:
          type: array
          items:
            type: string

    Skill:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
        description:
          type: string
        enabled:
          type: boolean

    SkillTemplate:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, developer, operator, viewer]
        active:
          type: boolean

    Plan:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        price:
          type: number
        limits:
          type: object
          properties:
            agents:
              type: integer
            messagesPerDay:
              type: integer
            skills:
              type: integer

    STTResult:
      type: object
      properties:
        text:
          type: string
        confidence:
          type: number
        language:
          type: string

    SecurityReport:
      type: object
      properties:
        grade:
          type: string
          enum: [A+, A, B, C, D, F]
        score:
          type: integer
        protections:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              enabled:
                type: boolean

    A2ATaskRequest:
      type: object
      required: [message]
      properties:
        id:
          type: string
        message:
          type: object
          properties:
            role:
              type: string
            parts:
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                  text:
                    type: string

    AgentCard:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        url:
          type: string
        capabilities:
          type: object

    HealthResponse:
      type: object
      properties:
        status:
          type: string
        service:
          type: string
        version:
          type: string
        timestamp:
          type: string
          format: date-time
        uptime:
          type: number
        providers:
          type: array
          items:
            type: string
        skills:
          type: integer
        agents:
          type: integer
        channels:
          type: array
          items:
            type: string
        protocols:
          type: array
          items:
            type: string
        features:
          type: array
          items:
            type: string
        activeSessions:
          type: integer
