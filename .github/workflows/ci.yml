name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # Dependency vulnerability scan
      - name: npm audit (high/critical)
        run: npm audit --audit-level=high || true

      # Secret detection — scan for leaked API keys, tokens, passwords
      - name: Secret detection
        run: |
          echo "Scanning for potential secrets in source code..."
          SECRETS_FOUND=0

          # Check for hardcoded API keys (skip .env.example, node_modules, dist)
          if grep -rn --include="*.ts" --include="*.js" --include="*.json" \
            -E "(sk-ant-|sk-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{36}|gsk_[a-zA-Z0-9]{20,}|hf_[a-zA-Z0-9]{20,})" \
            --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=.git \
            src/ packages/ 2>/dev/null | grep -v ".env.example" | grep -v "test" | grep -v "\.d\.ts"; then
            echo "::warning::Potential API keys found in source code"
            SECRETS_FOUND=1
          fi

          # Check for .env files that shouldn't be committed
          if [ -f ".env" ]; then
            echo "::error::.env file found in repository — must be in .gitignore"
            SECRETS_FOUND=1
          fi

          if [ $SECRETS_FOUND -eq 0 ]; then
            echo "✅ No secrets detected"
          fi

      # License compliance check
      - name: License check
        run: npx license-checker --production --onlyAllow "MIT;ISC;BSD-2-Clause;BSD-3-Clause;Apache-2.0;0BSD;CC0-1.0;CC-BY-3.0;CC-BY-4.0;Unlicense;Python-2.0;BlueOak-1.0.0" || true

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: cd packages/dashboard && npm ci
      - run: cd packages/dashboard && npx tsc -b
      - run: cd packages/dashboard && npx vite build
      - run: cd packages/dashboard && npx vitest run --reporter=verbose
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run tests with coverage
        run: npm run test -- --coverage
      - name: Check test count
        run: |
          TESTS=$(npm run test 2>&1 | grep -oP '\d+ passed' | grep -oP '\d+')
          echo "Tests passed: $TESTS"
          if [ "$TESTS" -lt 600 ]; then
            echo "::warning::Test count dropped below 600 (was 602)"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  build:
    runs-on: ubuntu-latest
    needs: [test, dashboard, security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: cd packages/dashboard && npm ci && npm run build
      - name: Copy dashboard to public
        run: mkdir -p public && cp -r packages/dashboard/dist/* public/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: build
          path: |
            dist/
            public/

  e2e:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: Start server and run E2E
        run: |
          node dist/index.js &
          sleep 5
          npx playwright test
        env:
          NODE_ENV: test
          PORT: 3000
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results
          path: test-results/

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-railway:
    runs-on: ubuntu-latest
    needs: [build, docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Railway
        if: env.RAILWAY_TOKEN != ''
        run: |
          npm i -g @railway/cli
          railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        continue-on-error: true

  # Publish to npm on tagged releases
  publish:
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
