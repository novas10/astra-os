[build]
builder = "NIXPACKS"
buildCommand = "npm ci && npm run build && cd packages/dashboard && npm ci && npm run build && cp -r dist ../../public"

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[service]
internalPort = 3000
