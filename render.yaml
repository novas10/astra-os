services:
  - type: web
    name: astra-os
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build && cd packages/dashboard && npm ci && npm run build && cp -r dist ../../public
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: MASTER_ENCRYPTION_KEY
        generateValue: true
