version: "3.9"

services:
  astra-os:
    build: .
    container_name: astra-os
    ports:
      - "${PORT:-3000}:3000"
      - "${CANVAS_PORT:-18793}:18793"
    env_file:
      - .env
    volumes:
      - astra-workspace:/app/workspace
      - astra-memory:/app/.astra-memory
      - astra-logs:/app/logs
      - ./skills:/app/skills:ro
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - astra-net

  redis:
    image: redis:7-alpine
    container_name: astra-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - astra-net

  # Optional: Vector DB for production embeddings
  # qdrant:
  #   image: qdrant/qdrant:latest
  #   container_name: astra-qdrant
  #   ports:
  #     - "6333:6333"
  #   volumes:
  #     - qdrant-data:/qdrant/storage
  #   restart: unless-stopped
  #   networks:
  #     - astra-net

volumes:
  astra-workspace:
  astra-memory:
  astra-logs:
  redis-data:
  # qdrant-data:

networks:
  astra-net:
    driver: bridge
