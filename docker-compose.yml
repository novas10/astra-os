version: "3.9"

services:
  astra-os:
    build: .
    container_name: astra-os
    ports:
      - "${PORT:-3000}:3000"
      - "${CANVAS_PORT:-18793}:18793"
    env_file:
      - .env
    volumes:
      - astra-workspace:/app/workspace
      - astra-memory:/app/.astra-memory
      - astra-logs:/app/logs
      - ./skills:/app/skills:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1024M
        reservations:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - astra-net

  # Dev mode with hot-reload: docker compose --profile dev up astra-dev
  astra-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-builder
    container_name: astra-dev
    command: npx ts-node-dev --respawn --transpile-only src/index.ts
    ports:
      - "${PORT:-3000}:3000"
      - "${CANVAS_PORT:-18793}:18793"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    volumes:
      - ./src:/app/src
      - ./skills:/app/skills
      - ./packages:/app/packages
      - astra-memory:/app/.astra-memory
      - astra-logs:/app/logs
    profiles:
      - dev
    networks:
      - astra-net

  # Optional: Vector DB for production embeddings
  # qdrant:
  #   image: qdrant/qdrant:latest
  #   container_name: astra-qdrant
  #   ports:
  #     - "6333:6333"
  #   volumes:
  #     - qdrant-data:/qdrant/storage
  #   restart: unless-stopped
  #   networks:
  #     - astra-net

volumes:
  astra-workspace:
  astra-memory:
  astra-logs:
  # qdrant-data:

networks:
  astra-net:
    driver: bridge
